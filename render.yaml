services:
  - type: web
    name: lottery-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lottery-db
          property: connectionString

databases:
  - name: lottery-db
    plan: free
    region: singapore
