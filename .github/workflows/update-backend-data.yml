name: Update Backend Data

on:
  schedule:
    # MarkSix: Tue/Thu/Sat after 21:30 Asia/Shanghai.
    # SSQ: Tue/Thu/Sun after 21:15 Asia/Shanghai.
    # Run at 22:30 Asia/Shanghai (14:30 UTC) on every draw day.
    - cron: '30 14 * * 0,2,4,6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger latest draw scrape
        run: |
          curl -fsS -X POST "${{ secrets.API_BASE_URL }}/api/v1/jackpot/scrape"

      - name: Wait for data import
        run: sleep 5

      - name: Check MarkSix health
        run: |
          curl -fsS "${{ secrets.API_BASE_URL }}/api/v1/health?lottery_type=marksix"
          curl -fsS "${{ secrets.API_BASE_URL }}/api/v1/jackpot/latest?lottery_type=marksix"

      - name: Check SSQ health
        run: |
          curl -fsS "${{ secrets.API_BASE_URL }}/api/v1/health?lottery_type=ssq"
          curl -fsS "${{ secrets.API_BASE_URL }}/api/v1/jackpot/latest?lottery_type=ssq"
