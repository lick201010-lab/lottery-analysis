<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">弈彩 YiCai Logo</title>
  <desc id="desc">A dark navy circular mark with a muted-gold five-spoke emblem.</desc>
  <defs>
    <radialGradient id="navy" cx="34%" cy="24%" r="76%">
      <stop offset="0" stop-color="#24354a"/>
      <stop offset="0.54" stop-color="#112235"/>
      <stop offset="1" stop-color="#071323"/>
    </radialGradient>
    <linearGradient id="gold" x1="120" y1="72" x2="390" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1bd"/>
      <stop offset="0.45" stop-color="#d8b36a"/>
      <stop offset="1" stop-color="#8e6421"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#071323" flood-opacity="0.22"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="205" fill="url(#navy)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="207" fill="none" stroke="#f1d38d" stroke-width="8"/>
  <circle cx="256" cy="256" r="194" fill="none" stroke="#7d5a24" stroke-width="3" opacity="0.85"/>

  <g fill="url(#gold)">
    <circle cx="256" cy="256" r="38"/>
    <g transform="translate(256 256)">
      <rect x="-23" y="-158" width="46" height="112" rx="23"/>
      <rect x="-23" y="-158" width="46" height="112" rx="23" transform="rotate(72)"/>
      <rect x="-23" y="-158" width="46" height="112" rx="23" transform="rotate(144)"/>
      <rect x="-23" y="-158" width="46" height="112" rx="23" transform="rotate(216)"/>
      <rect x="-23" y="-158" width="46" height="112" rx="23" transform="rotate(288)"/>
    </g>
  </g>
</svg>
